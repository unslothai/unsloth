# Model defaults for unsloth/Qwen3.5-2B
# Qwen3.5 is a vision-language family with hybrid linear attention
# (GatedDeltaNet); all-linear covers the linear-attention projections too.
# Also applies to: Qwen/Qwen3.5-2B

training:
  trust_remote_code: false
  max_seq_length: 2048
  num_epochs: 0
  learning_rate: 2e-4
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 30
  save_steps: 30
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: "unsloth"
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"

lora:
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - "all-linear"
  use_rslora: false
  use_loftq: false
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

logging:
  enable_wandb: false
  wandb_project: "llm-finetuning"
  enable_tensorboard: false
  tensorboard_dir: "runs"
  log_frequency: 10

inference:
  trust_remote_code: false
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  min_p: 0.0
