# Model defaults for unsloth/whisper-large-v3
# Based on Whisper.ipynb
# Also applies to: unsloth/whisper-large-v3, openai/whisper-large-v3

audio_type: whisper
audio_input: true

training:
  trust_remote_code: false
  eval_steps: 5
  max_seq_length: 448
  # num_epochs: 4
  num_epochs: 0
  learning_rate: 1e-4
  batch_size: 1
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 30
  save_steps: 30
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: "unsloth"
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"

lora:
  lora_r: 64
  lora_alpha: 64
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "v_proj"
  use_rslora: false
  use_loftq: false

logging:
  enable_wandb: false
  wandb_project: "llm-finetuning"
  enable_tensorboard: false
  tensorboard_dir: "runs"
  log_frequency: 10

inference:
  trust_remote_code: false
