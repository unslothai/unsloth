# Model defaults for answerdotai/ModernBERT-large
# Based on bert_classification.ipynb

training:
  trust_remote_code: false
  max_seq_length: 2048
  # num_epochs: 1
  num_epochs: 0
  learning_rate: 5e-5
  batch_size: 32
  gradient_accumulation_steps: 1
  warmup_steps: 5
  max_steps: 30
  save_steps: 30
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: "unsloth"
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"

lora:
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_rslora: false
  use_loftq: false

logging:
  enable_wandb: false
  wandb_project: "llm-finetuning"
  enable_tensorboard: false
  tensorboard_dir: "runs"
  log_frequency: 10

inference:
  trust_remote_code: false
