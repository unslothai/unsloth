# Model defaults for unsloth/granite-4.0-h-micro
# Based on Granite4.0.ipynb
# Also applies to: ibm-granite/granite-4.0-h-micro, unsloth/granite-4.0-h-micro-bnb-4bit, unsloth/granite-4.0-h-micro-unsloth-bnb-4bit

training:
  max_seq_length: 2048
  num_epochs: 4
  learning_rate: 2e-4
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 0
  save_steps: 0
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: "unsloth"
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"

lora:
  lora_r: 32
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
    - "shared_mlp.input_linear"
    - "shared_mlp.output_linear"
  use_rslora: false
  use_loftq: false
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

logging:
  enable_wandb: false
  wandb_project: "llm-finetuning"
  enable_tensorboard: false
  tensorboard_dir: "runs"
  log_frequency: 10

