# Model defaults for unsloth/all-MiniLM-L6-v2
# Based on All_MiniLM_L6_v2.py embedding notebook

training:
  max_seq_length: 512
  # num_epochs: 2
  num_epochs: 0
  learning_rate: 2e-4
  batch_size: 256
  gradient_accumulation_steps: 1
  warmup_ratio: 0.03
  max_steps: 30
  save_steps: 30
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: false
  gradient_checkpointing: false
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"

lora:
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  target_modules:
    - "value"
    - "key"
    - "dense"
    - "query"
  use_rslora: false
  use_loftq: false

logging:
  enable_wandb: false
  wandb_project: "embedding-finetuning"
  enable_tensorboard: false
  tensorboard_dir: "runs"
  log_frequency: 50
