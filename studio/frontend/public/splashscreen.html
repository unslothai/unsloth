<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsloth Studio</title>
  <style>
    @font-face {
      font-family: 'Hellix';
      src: url('fonts/Hellix-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: block;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0c0c0c;
      --text-color: #888;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --text-color: #666;
      }
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Hellix', system-ui, sans-serif;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadein 600ms ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .splash {
        animation: none;
        opacity: 1;
      }
    }

    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .logo {
      width: 160px;
      height: auto;
    }

    /* Dark mode: white logo; light mode: black logo */
    .logo-dark  { display: block; }
    .logo-light { display: none; }

    @media (prefers-color-scheme: light) {
      .logo-dark  { display: none; }
      .logo-light { display: block; }
    }

    .mascot {
      width: 80px;
      height: auto;
    }

    .loading {
      color: var(--text-color);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo logo-dark"  src="whitelogo.png" alt="Unsloth" />
    <img class="logo logo-light" src="blacklogo.png" alt="Unsloth" />
    <img class="mascot" src="Sloth emojis/sloth pc emoji.png" alt="" />
    <span class="loading">Loading...</span>
  </div>
</body>
</html>
