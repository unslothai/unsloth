# Unsloth Full Fine-Tuning Config
# Updates ALL model weights (no LoRA adapter). Needs significantly more VRAM.
# Copy this file, edit model/dataset, then: unsloth train --config this-file.yaml --dry-run

model: unsloth/Qwen3.5-4B              # HuggingFace model ID (non-GGUF for training)

data:
  dataset: tatsu-lab/alpaca               # HuggingFace dataset ID
  # local_dataset:                        # uncomment for local files (list of paths)
  #   - ./data/train.jsonl
  format_type: auto                       # auto | alpaca | chatml | sharegpt

training:
  training_type: full                     # full fine-tuning (all weights updated)
  max_seq_length: 2048
  load_in_4bit: false                     # full fine-tuning typically uses fp16/bf16
  output_dir: outputs
  num_epochs: 1
  learning_rate: 0.0002
  batch_size: 1                           # lower batch size — full fine-tuning uses more VRAM
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 0
  save_steps: 0
  weight_decay: 0.01
  random_seed: 3407
  packing: false
  train_on_completions: false
  gradient_checkpointing: "unsloth"

lora:                                     # lora section present but largely ignored for full fine-tuning
  lora_r: 64
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules: ""                      # not used for full fine-tuning
  vision_all_linear: false
  use_rslora: false
  use_loftq: false
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

logging:
  enable_wandb: false
  wandb_project: unsloth-training
  enable_tensorboard: false
  tensorboard_dir: runs
