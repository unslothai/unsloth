# Publishes the unsloth wheel + sdist to PyPI when a release lands on main.
#
# A release is marked by the installer-pin bump (e.g. "Bump install.sh /
# install.ps1 pin to unsloth>=2026.6.6"), where the `unsloth>=` floor in
# install.sh reaches __version__. We gate on that content rather than the
# commit title, which has been worded several different ways over time. The
# `decide` job publishes only when the install.sh pin equals __version__ and
# that version is not already on PyPI, so it fires exactly once per release and
# ignores unrelated install.sh edits and re-runs.
#
# We do not trigger on v* tags: those are Studio release tags (v0.1.x-beta).
# They are unrelated to the PyPI package version (taken from __version__), but
# the published wheel must still carry the current Studio version in its stamp
# (release-desktop.yml verifies the downloaded wheel's STUDIO_RELEASE_VERSION),
# so the build job resolves it via `git describe` and stamps it.
#
# Build and publish are separate jobs: the frontend/package build (npm + many
# third-party deps) runs unprivileged and hands dist/ to the publish job as an
# artifact. Only the publish job holds the OIDC `id-token: write` permission, so
# a compromised build dependency cannot mint a PyPI trusted-publishing token --
# this is the separation PyPA recommends.
#
# Uses PyPI Trusted Publishing (OIDC) -- no API token is stored in the repo;
# the publisher must be registered on PyPI for unslothai/unsloth +
# pypi-publish.yml (+ the `pypi` environment below).

name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - install.sh

permissions:
  contents: read

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether to publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      publish: ${{ steps.check.outputs.publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - id: check
        run: |
          # `|| true`: steps run under `set -eo pipefail`, so a no-match grep
          # would abort the step. We want a missing/odd pin to skip, not fail.
          pin=$(grep -oP 'unsloth>=\K[0-9]+\.[0-9]+\.[0-9]+' install.sh | sort -u || true)
          ver=$(grep -m1 -oP '__version__ = "\K[^"]+' unsloth/models/_utils.py || true)
          echo "install.sh pin: ${pin:-<none>} / __version__: $ver"
          publish=false
          if [ "$(printf '%s\n' "$pin" | grep -c .)" = "1" ] && [ "$pin" = "$ver" ]; then
            code=$(curl -sS -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/unsloth/$ver/json" || true)
            case "${code:-000}" in
              404) publish=true; echo "unsloth $ver not on PyPI -> publish" ;;
              200) echo "unsloth $ver already on PyPI -> skip" ;;
              *)   echo "::error::unexpected PyPI status ${code:-000} for unsloth $ver"; exit 1 ;;
            esac
          else
            echo "pin does not match __version__ (or is ambiguous) -> skip"
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  build:
    name: Build wheel + sdist
    needs: decide
    if: needs.decide.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # need tags for `git describe` (Studio release version)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Resolve Studio release version
        id: studio
        run: |
          studio=$(git describe --tags --abbrev=0 --match 'v[0-9]*' || true)
          [ -n "$studio" ] || { echo "::error::no v* Studio tag found to stamp"; exit 1; }
          echo "Studio release version: $studio"
          echo "studio=$studio" >> "$GITHUB_OUTPUT"

      - name: Build frontend + wheel + sdist
        # build.sh stamps STUDIO_RELEASE_VERSION from this env var (read first by
        # stamp_studio_release.py), matching the maintainer's `build.sh publish`.
        env:
          UNSLOTH_STUDIO_RELEASE_VERSION: ${{ steps.studio.outputs.studio }}
        run: |
          python -m pip install --upgrade pip build
          bash build.sh

      - name: Verify the Studio stamp landed in dist/
        env:
          STUDIO: ${{ steps.studio.outputs.studio }}
        run: python scripts/stamp_studio_release.py --verify-dist dist --expected "$STUDIO"

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC); no checkout or build here
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pypi-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
