# Runs studio/backend/tests/test_export_capability.py on Linux, Windows and macOS.
#
# Why: Studio export is gated by hardware.export_capability(), which decides
# whether export can run and, when it cannot, which reason to surface
# (pytorch_not_installed on a --no-torch install, no_accelerator on a
# bare-CPU host, mlx_unavailable on Apple Silicon without MLX). That decision
# is per-OS: is_apple_silicon() and the PyTorch-import probe behave
# differently on each platform, and the export backend must stay importable
# without PyTorch so the worker degrades to a clear message instead of
# crashing. Hosted runners have no GPU/MLX, so this job confirms the gating
# and import-safety on real Windows/macOS (the "export unavailable, here is
# why" path a Mac/Windows user without an accelerator actually sees); a real
# GPU/MLX export is validated separately on accelerator hardware.
#
# No GPU, no model download, no llama.cpp: the capability matrix mocks the
# lightweight probes and the import-safety test blocks torch/unsloth, so the
# job installs only a CPU PyTorch plus the backend import deps and runs in
# seconds.

name: Studio export capability

on:
  pull_request:
    paths:
      - 'studio/backend/utils/hardware/hardware.py'
      - 'studio/backend/core/export/export.py'
      - 'studio/backend/routes/export.py'
      - 'studio/backend/main.py'
      - 'studio/backend/tests/test_export_capability.py'
      - '.github/workflows/studio-export-capability-ci.yml'
  push:
    branches: [main]
    paths:
      - 'studio/backend/utils/hardware/hardware.py'
      - 'studio/backend/core/export/export.py'
      - 'studio/backend/routes/export.py'
      - 'studio/backend/main.py'
      - 'studio/backend/tests/test_export_capability.py'
      - '.github/workflows/studio-export-capability-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capability:
    name: capability (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      # No accelerator on hosted runners; keep detection on the CPU path and
      # off any incidental CUDA device the image might expose.
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install CPU PyTorch
        # Pin to the CPU wheel index so every OS gets a CPU build (Windows
        # would otherwise pull a CUDA wheel from PyPI; macOS has no CUDA wheel).
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.4,<2.13"
      - name: Install backend import deps
        # Enough to import utils.hardware and core.export.export; deliberately
        # NOT unsloth (it needs a GPU to import and the import-safety test
        # blocks it) and NOT triton/llama.cpp (Linux-only / native builds).
        run: python -m pip install
          transformers peft accelerate safetensors huggingface_hub datasets
          sentencepiece protobuf fastapi starlette structlog psutil
          python-multipart pydantic httpx "numpy<3" pytest
      - name: Export capability + import-safety tests
        working-directory: studio/backend
        run: python -m pytest tests/test_export_capability.py -q
