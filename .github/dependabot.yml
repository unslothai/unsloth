---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pip-root:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/studio/backend/plugins/data-designer-unstructured-seed"
    schedule:
      interval: "weekly"
    groups:
      pip-data-designer:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/studio/backend/requirements"
    schedule:
      interval: "weekly"
    groups:
      pip-backend-requirements:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/unsloth/kernels/moe"
    schedule:
      interval: "weekly"
    groups:
      pip-moe:
        patterns: ["*"]

  - package-ecosystem: "bun"
    directory: "/studio/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      bun-frontend:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/studio/backend/core/data_recipe/oxc-validator"
    schedule:
      interval: "weekly"
    groups:
      npm-oxc-validator:
        patterns: ["*"]
...
